<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수-1</title>
</head>
<body>
    
    <script>
        // 변수 : 데이터를 담는 상자
        // 변수 선언과 할당
        let name = "이예빈"
        console.log(name);
        let age = 25;
        console.log(age);
        age = 30; // 재할당
        console.log(age);
        const age2 = 40 
        console.log(age2);
        // age2 = 50; // const 사용시 재할당 불가
        // let age = 10; // let, const : 똑같은 변수 사용 불가
        let userName = prompt("이름을 입력하세요.");
        console.log(userName);
        document.write(`<p>${userName}님 나이는 ${age}입니다. 만나서 반갑습니다.</p>`)
        
        
    </script>
</body>
</html>
