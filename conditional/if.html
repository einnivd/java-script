<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조건문-if</title>
</head>
<body>
    <script>
        // if의 기본구조
        // if(조건){
        //     조건에 부합할 때 실행할 코드
        // }
        let age = 18;
        if(age < 20){
            console.log("미성년자입니다.");
            // alert("미성년자입니다.")
        }
       
        // if - else (둘 중 하나 선택)
        // if(조건){
        //     조건에 부합할 때 실행할 코드
        // }else{
        //     조건에 부합하지 않을 때 실행할 코드
        // }
        let age1 = 25;
        if(age1 < 20){
            console.log("미성년자");
        }else{
            console.log("성인");
        }
    </script>
</body>
</html>
