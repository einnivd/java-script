<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 로그인 상태 변경 -->
    <button id="loginBtn">로그인</button>
    <p id="text">로그아웃 상태</p>
    <!-- 좋아요 버튼 -->
    <button id="likeBtn">💙좋아요</button>
    <!-- 입력값 검사 -->
    <div class="form">
      <input type="text" id="input" placeholder="아이디 입력" />
      <button id="checkBtn">확인</button>
    </div>

    <script>
      // 로그인 상태 변경
      let isLogin = false;
      const btn = document.querySelector("#loginBtn");
      // console.log(btn);
      const text = document.querySelector("#text");
      // console.log(text);

      // function(){} 과 ()=>{} 는 같다.
      // btn.addEventListener("click" ()=>{})
      btn.addEventListener("click", function () {
        if (isLogin) {
          // 로그인 돼있으면 => 로그아웃
          isLogin = false;
          text.innerText = "로그아웃 상태";
          btn.innerText = "로그인";
        } else {
          // 로그인 안 돼있으면 => 로그인
          isLogin = true;
          text.innerText = "로그인 상태";
          btn.innerText = "로그아웃";
        }
        console.log(isLogin);
      });

      // 좋아요 버튼
      let isLike = false;
      const likeBtn = document.querySelector("#likeBtn");
      likeBtn.addEventListener("click", () => {
        isLike = !isLike; // 상태 토글
        if (isLike) {
        //   isLike = false;
          likeBtn.innerText = "💙좋아요";
        } else {
        //   isLike = true;
          likeBtn.innerText = "💛좋아요";
        }
        console.log(isLike);
      });

      // 입력값 검사
      const input = document.querySelector("#input")
      const inputBtn = document.querySelector("#checkBtn")
      console.log(input);
      console.log(input.value);
      
      inputBtn.addEventListener("click" , ()=>{
        console.log(input.value);
        if(input.value === ""){
            alert("아이디를 입력하세요.")
        }else{
            alert("확인 완료 !!!")
        }
      });
    </script>
  </body>
</html>
