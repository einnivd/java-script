<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수-3</title>
</head>
<body>
    <script>
        // banana 변수 선언하고 금액을 할당하세요.
        // apple 변수 선언하고 금액을 할당하세요.
        // mango 변수 선언하고 금액을 할당하세요.
        // total 변수 선언하고 banana apple mango 다 더한 식을 할당하세요.
        // 화면에 출력 : 바나나 사과 망고를 다 더한 금액은 ... 입니다.

        let banana = 100;
        let apple = 200;
        let mango = 300;
        let bananaCount = 100
        let appleCount = 200
        let mangoCount = 300
        let total = (banana*bananaCount) + (apple*appleCount) + (mango*mangoCount);
        document.write(`<p>바나나 사과 망고를 다 더한 금액은 <span>${total}</span>입니다.</p>`)
    </script>
</body>
</html>
